name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  scan:
    name: Security Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1

      - name: Dependency Scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt -f json -o pip-audit.json

      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: pip-audit.json

  build:
    name: Build, Scan, SBOM
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Image Tag
        run: echo "IMAGE_TAG=secure-app:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: docker build -t $IMAGE_TAG .

      - name: Container Scan (Trivy)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: json
          output: trivy-report.json
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Generate SBOM (CycloneDX via Syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh
          ./bin/syft $IMAGE_TAG -o cyclonedx-json > sbom.json

      - name: Mark Trusted Build
        run: |
          echo "trusted=true" > trusted-build.txt
          echo "image=${IMAGE_TAG}" >> trusted-build.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            trivy-report.json
            sbom.json
            trusted-build.txt