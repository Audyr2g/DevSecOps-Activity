name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  sast-and-test:
    name: Code Security & Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Dependency Vulnerability Scan (Safety)
      run: safety check -r requirements.txt --full-report

    - name: Run Unit Tests (Pytest)
      env:
        PYTHONPATH: .
      run: python -m pytest tests/ -v

  build-and-container-scan:
    name: Build & Container Security Scan
    needs: sast-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t secure-app:${{ github.sha }} .

    - name: Container Vulnerability Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'secure-app:${{ github.sha }}'
        format: 'table'
        exit-code: '1' # Fail pipeline if vulnerabilities are found
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

  deploy:
    name: Deployment Stage
    needs: build-and-container-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Simulate Production Deployment
      run: |
        echo "✅ Pipeline checks passed."
        echo "🚀 Initiating deployment of secure-app:${{ github.sha }} to production..."
        sleep 2
        echo "🟢 Deployment successful! Service is routing traffic."